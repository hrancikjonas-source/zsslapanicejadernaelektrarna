<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaderná elektrárna Temelín - Projekt 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .building-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; }
        .building-card:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.2); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <div id="app">
        <!-- HLAVNÍ STRÁNKA -->
        <div id="home-page">
            <header class="bg-slate-900 text-white py-32 px-4 text-center relative overflow-hidden">
                <div class="absolute inset-0 opacity-60">
                    <img src="https://raw.githubusercontent.com/hrancikjonas-source/jadern-alektr-rna-Temelin-zs-slapanice-/main/Snímek%20obrazovky%202026-03-30%20v%2014.20.48.jpg" 
                         class="w-full h-full object-cover" alt="Panorama Temelína">
                </div>
                <div class="relative z-10 bg-slate-900/80 p-12 inline-block rounded-[3rem] backdrop-blur-xl border border-white/10 shadow-2xl">
                    <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter uppercase italic">TEMELÍN <span class="text-blue-500">360°</span></h1>
                    <p class="text-xl opacity-95 font-light uppercase tracking-[0.3em]">Fyzikální projekt 2026</p>
                </div>
            </header>

            <section class="max-w-7xl mx-auto py-24 px-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="buildings-grid">
                    <!-- Karty se vygenerují přes JS -->
                </div>
            </section>
        </div>

        <!-- DETAIL STRÁNKA -->
        <div id="detail-page" class="hidden min-h-screen fade-in">
            <nav class="bg-slate-900 text-white p-6 sticky top-0 z-50 border-b border-white/5 shadow-xl">
                <div class="max-w-6xl mx-auto flex justify-between items-center">
                    <button onclick="goBack()" class="flex items-center gap-3 font-black uppercase text-xs tracking-[0.2em] hover:text-blue-400 transition-all">
                        <i data-lucide="arrow-left" size="20"></i> Zpět do menu
                    </button>
                    <span class="text-[10px] opacity-30 font-mono tracking-widest uppercase hidden md:inline" id="url-tag"></span>
                </div>
            </nav>
            <main class="max-w-5xl mx-auto py-16 px-6" id="detail-content"></main>
        </div>

        <!-- PATIČKA -->
        <footer class="bg-slate-900 py-24 text-center text-white border-t border-white/5">
            <div class="max-w-xl mx-auto px-6">
                <div class="flex justify-center gap-4 mb-8">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl rotate-3">
                        <i data-lucide="users" size="28" class="text-white -rotate-3"></i>
                    </div>
                </div>
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-[0.5em] mb-4">Projekt vytvořili</p>
                <h3 class="text-3xl font-black mb-1 tracking-tight">Jonáš Hrančík & Kryštof Stejskal</h3>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-widest mb-12">9. třída ZŠ Šlapanice</p>
                <div class="h-px w-24 bg-gradient-to-r from-transparent via-white/20 to-transparent mx-auto mb-8"></div>
                <p class="text-white/30 text-[10px] uppercase tracking-[0.2em] font-light italic">
                    Všechna práva vyhrazena &copy; 2026
                </p>
            </div>
        </footer>
    </div>

    <script>
        const buildings = [
            { 
                id: 'reaktor', 
                title: "Reaktorový sál", 
                icon: 'atom', 
                color: 'bg-blue-600', 
                desc: 'Srdce elektrárny s reaktorem VVER-1000.', 
                content: `V reaktoru probíhá řízená řetězová reakce. Neutrony narážejí do jader Uranu-235, která se štěpí na dva menší fragmenty. Při tomto procesu se uvolňuje obrovské množství tepla (vazebná energie jádra). Voda v primárním okruhu je pod extrémním tlakem 15,7 MPa, aby nevařila ani při teplotě přesahující 300 °C.` 
            },
            { 
                id: 'pomocne', 
                title: "Pomocné provozy", 
                icon: 'shield-alert', 
                color: 'bg-indigo-500', 
                desc: 'Chemická úprava a bezpečnostní systémy.', 
                content: `Tento objekt zajišťuje čištění vody a kontrolu radioaktivity. Voda v primárním okruhu musí být extrémně čistá, aby nedocházelo ke korozi materiálů v reaktoru. Jsou zde také systémy pro filtraci a bezpečné zachycování všech látek, aby elektrárna neovlivňovala okolní prostředí.` 
            },
            { 
                id: 'strojovna', 
                title: "Strojovna", 
                icon: 'settings', 
                color: 'bg-amber-500', 
                desc: 'Přeměna páry na elektrickou energii.', 
                content: `Zde dochází k přeměně energií. Pára ze sekundárního okruhu roztáčí lopatky turbíny silou, která ji uvádí do pohybu o rychlosti 3000 otáček za minutu. Turbína otáčí rotorem generátoru, kde na principu elektromagnetické indukce (pohyb magnetu v cívce) vzniká elektrický proud.` 
            },
            { 
                id: 'veze', 
                title: "Chladicí věže", 
                icon: 'cloud', 
                color: 'bg-cyan-500', 
                desc: 'Ochlazování vody sekundárního okruhu.', 
                content: `Dominanta Temelína vysoká 155 metrů. Věže fungují jako obří tepelné výměníky. Teplá voda se v horní části věže rozstřikuje a padá jako jemný déšť. Díky hyperboloidnímu tvaru věže vzniká přirozený komínový tah, který vodu ochlazuje vzduchem proudícím zdola nahoru.` 
            },
            { 
                id: 'cerpaci', 
                title: "Čerpací stanice", 
                icon: 'droplets', 
                color: 'bg-blue-800', 
                desc: 'Oběhová čerpadla a doprava vody.', 
                content: `Cévní systém elektrárny. Obrovská čerpadla neustále prohánějí tisíce tun vody mezi reaktorem, turbínou a chladicími věžemi. Bez neustálého proudění chladicí vody by nebylo možné odvádět teplo z reaktoru ani kondenzovat páru za turbínou.` 
            },
            { 
                id: 'rozvodna', 
                title: "Rozvodna", 
                icon: 'zap', 
                color: 'bg-orange-600', 
                desc: 'Vývod výkonu do sítě 400 kV.', 
                content: `Vyrobený elektrický proud má napětí cca 24 kV. V obřích transformátorech se toto napětí zvyšuje na 400 000 V (400 kV). Vyšší napětí se používá proto, aby se minimalizovaly tepelné ztráty při přenosu elektřiny na velké vzdálenosti k lidem domů.` 
            }
        ];

        function init() {
            const grid = document.getElementById('buildings-grid');
            buildings.forEach(b => {
                const card = document.createElement('div');
                card.className = "building-card bg-white p-12 rounded-[3rem] cursor-pointer text-center flex flex-col items-center shadow-lg";
                card.onclick = () => { window.location.hash = b.id; };
                card.innerHTML = `
                    <div class="w-20 h-20 rounded-[1.5rem] ${b.color} text-white flex items-center justify-center mb-8 shadow-xl shadow-slate-100">
                        <i data-lucide="${b.icon}" size="32"></i>
                    </div>
                    <h3 class="text-2xl font-black mb-4 text-slate-800">${b.title}</h3>
                    <p class="text-slate-500 text-sm leading-relaxed">${b.desc}</p>
                    <div class="mt-8 text-blue-600 font-black text-[10px] uppercase tracking-[0.2em] opacity-60">Detail sekce</div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
            setTimeout(handleRouting, 100);
        }

        function handleRouting() {
            const hash = window.location.hash.split('?')[0].replace('#', '');
            const building = buildings.find(b => b.id === hash);
            if (building) renderDetail(building); else renderHome();
        }

        function renderDetail(b) {
            const content = document.getElementById('detail-content');
            document.getElementById('url-tag').innerText = `LOC_ID: ${b.id.toUpperCase()}`;
            content.innerHTML = `
                <div class="bg-white rounded-[4rem] shadow-2xl overflow-hidden border border-slate-100 fade-in">
                    <div class="${b.color} h-48 flex items-center justify-center">
                         <i data-lucide="${b.icon}" size="80" class="text-white opacity-40"></i>
                    </div>
                    <div class="p-12 md:p-20">
                        <div class="flex flex-col md:flex-row items-center gap-8 mb-12 border-b border-slate-100 pb-12 text-center md:text-left">
                            <div class="p-6 rounded-[2rem] ${b.color} text-white shadow-2xl shadow-slate-200">
                                <i data-lucide="${b.icon}" size="48"></i>
                            </div>
                            <div>
                                <h1 class="text-4xl md:text-6xl font-black text-slate-900 tracking-tighter">${b.title}</h1>
                                <p class="text-blue-600 font-bold uppercase tracking-widest text-xs mt-3">Fyzikální rozbor objektu</p>
                            </div>
                        </div>
                        <p class="text-xl md:text-2xl text-slate-600 leading-relaxed font-light italic">${b.content}</p>
                        <button onclick="goBack()" class="mt-20 w-full py-8 bg-slate-900 hover:bg-blue-600 text-white rounded-[2.5rem] font-black uppercase tracking-[0.3em] transition-all shadow-2xl flex items-center justify-center gap-4 text-sm">
                            <i data-lucide="arrow-left" size="20"></i> Zpět na rozcestník
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            lucide.createIcons();
            window.scrollTo(0,0);
        }

        function renderHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('detail-page').classList.add('hidden');
            window.scrollTo(0,0);
        }

        function goBack() {
            history.pushState("", document.title, window.location.pathname);
            renderHome();
        }

        window.addEventListener('hashchange', handleRouting);
        window.onload = init;
    </script>
</body>
</html>
